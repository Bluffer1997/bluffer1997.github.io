<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hotel Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h2 class="logo">Hotel Manager</h2>
    <div class="nav-buttons">
      <button class="login-btn">Staff Login</button>
      <button class="signup-btn">Sign Up</button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>Find Your Perfect Stay</h1>
      <p>Comfort, convenience, and simplicity.</p>

      <div class="booking-bar">
        <input type="date" id="checkIn" value="2026-05-24">
        <input type="date" id="checkOut" value="2026-05-25">
        <select>
          <option id="roomType">Room Type</option>
          <option id="singleRoom">Single</option>
          <option id="doubleRoom">Double</option>
          <option id="suiteRoom">Suite</option>
        </select>
        <button id="searchDate">Search</button>
      </div>
    </div>
  </section>

  <!-- ROOMS -->
  <section class="rooms">
    <h2>Our Rooms</h2>

    <div class="room-grid">
      <div class="room-card">
        <div class="room-img"></div>
        <div class="room-content">
          <h3>Single Room</h3>
          <p>Perfect for solo travelers.</p>
          <span>$90/night</span>
          <button>Book Now</button>
        </div>
      </div>

      <div class="room-card">
        <div class="room-img"></div>
        <div class="room-content">
          <h3>Double Room</h3>
          <p>Comfort for two guests.</p>
          <span>$140/night</span>
          <button>Book Now</button>
        </div>
      </div>

      <div class="room-card">
        <div class="room-img"></div>
        <div class="room-content">
          <h3>Suite</h3>
          <p>Luxury and space combined.</p>
          <span>$250/night</span>
          <button>Book Now</button>
        </div>
      </div>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta">
    <h2>Ready to book your stay?</h2>
    <button>Check Availability</button>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Hotel</p>
  </footer>

  <!-- LOGIN MODAL -->
  <div class="modal">
    <div class="modal-content">
      <h2>Staff Login</h2>
      <input type="text" placeholder="Email">
      <input type="password" placeholder="Password">
      <button class="primary-btn">Login</button>
      <button class="close-btn">X</button>

    </div>
  </div>
<script src="script.js"></script>
</body>
</html>
